---
# Source: connector/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: test-connector
  labels:
    app.kubernetes.io/name: connector
    helm.sh/chart: connector-major.minor.patch-test
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
type: Opaque
data:
  TWINGATE_ACCESS_TOKEN: "QUNDRVNTX1RPS0VO"
  TWINGATE_REFRESH_TOKEN: "UkVGUkVTSF9UT0tFTg=="
---
# Source: connector/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-connector
  labels:
    app.kubernetes.io/name: connector
    helm.sh/chart: connector-major.minor.patch-test
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: connector
      app.kubernetes.io/instance: test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: connector
        app.kubernetes.io/instance: test
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9999"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: connector
          image: "twingate/connector:1"
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9999
              protocol: TCP
          readinessProbe:
            exec:
              command:
              - /connectorctl
              - health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
              - /connectorctl
              - health
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: test-connector
                optional: false
          env:
            - name: TWINGATE_LABEL_DEPLOYED_BY
              value: helm
            - name: TWINGATE_LABEL_HELM_CHART
              value: connector-major.minor.patch-test
            - name: TWINGATE_URL
              value: "https://test-tenant.twingate.com"
            - name: TWINGATE_LOG_LEVEL
              value: "3"
            - name: TWINGATE_METRICS_PORT
              value: "9999"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 200Mi
          volumeMounts:
          - name: twingate-socket
            mountPath: /var/run/twingate
      volumes:
      - name: twingate-socket
        emptyDir: {}
---
# Source: connector/templates/podmonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: test-connector
  labels:
    app.kubernetes.io/name: connector
    helm.sh/chart: connector-major.minor.patch-test
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    release: prometheus
spec:
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/name: connector
      app.kubernetes.io/instance: test
